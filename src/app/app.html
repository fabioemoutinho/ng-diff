<mat-toolbar color="primary" class="toolbar">
  <a routerLink="/diff" class="toolbar-brand">
    <span class="brand-ng">ng</span><span class="brand-diff">diff</span>
  </a>
  <span class="toolbar-spacer"></span>
  <button mat-icon-button (click)="copyShareUrl()" matTooltip="Copy shareable URL">
    <mat-icon>share</mat-icon>
  </button>
  <a mat-icon-button href="https://github.com/fabioemoutinho/ng-diff" target="_blank" rel="noopener"
     matTooltip="View on GitHub">
    <mat-icon svgIcon="github"></mat-icon>
  </a>
</mat-toolbar>

<main class="main-content">
  <router-outlet />
</main>
