name: Check for new CLI versions

on:
  schedule:
    - cron: '0 6,18 * * *'   # Twice daily: 6am and 6pm UTC
  workflow_dispatch:           # Manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Check for outdated versions and update version-map.js
        id: check
        run: node scripts/check-versions.js

      - name: Commit version-map.js if updated
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/version-map.js
          if git diff --cached --quiet; then
            echo "version-map.js unchanged"
          else
            git commit -m "chore: update version-map.js with latest CLI versions"
            git push
          fi

      - name: Dispatch generate workflow if needed
        if: steps.check.outputs.versions_to_update != '[]' && steps.check.outputs.versions_to_update != ''
        uses: actions/github-script@v7
        with:
          script: |
            const versions = '${{ steps.check.outputs.versions_to_update }}';
            console.log('Dispatching generate for versions:', versions);
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'generate.yml',
              ref: 'main',
              inputs: { versions }
            });
