name: Generate snapshots

on:
  workflow_dispatch:
    inputs:
      versions:
        description: 'JSON array of Angular major versions to generate, e.g. [17,18,21]. Empty means all.'
        required: false
        default: '[]'
      force:
        description: 'Force regeneration of all versions, ignoring the skip logic'
        type: boolean
        default: false

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - id: build-matrix
        run: node scripts/build-matrix.js --versions '${{ inputs.versions }}'

  generate:
    needs: setup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Generate snapshots for Angular ${{ matrix.angular-majors }}
        run: |
          if [ "${{ inputs.force }}" = "true" ]; then
            node scripts/generate.js --force --versions '${{ matrix.angular-majors }}'
          else
            node scripts/generate.js --versions '${{ matrix.angular-majors }}'
          fi

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes to commit for node ${{ matrix.node-version }}"
            exit 0
          fi
          git commit -m "chore: regenerate snapshots for angular ${{ matrix.angular-majors }}"
          # Retry push up to 5 times to handle parallel matrix job conflicts
          for i in 1 2 3 4 5; do
            git pull --rebase origin main && git push && break
            echo "Push attempt $i failed, retrying..."
            sleep $((i * 3))
          done
